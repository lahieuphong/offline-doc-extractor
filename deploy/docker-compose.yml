services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-offline_doc_extractor}_redis
    restart: unless-stopped

  backend:
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-offline_doc_extractor}_backend
    env_file:
      - ./.env
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      MAX_TEXT_CHARS: ${MAX_TEXT_CHARS}
      USE_LLM_DEFAULT: ${USE_LLM_DEFAULT}
      REDIS_URL: ${REDIS_URL}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_DIR: ${STORAGE_DIR}
      OCR_TESSERACT_PSM: ${OCR_TESSERACT_PSM:-6}
      OCR_TARGETED_REGIONS: ${OCR_TARGETED_REGIONS:-1}
      OCR_TARGETED_ZOOM: ${OCR_TARGETED_ZOOM:-3.0}
      OCR_TARGETED_TIMEOUT_SEC: ${OCR_TARGETED_TIMEOUT_SEC:-12}
      OCR_TIMEOUT_SEC: ${OCR_TIMEOUT_SEC:-45}
      OCR_RENDER_ZOOM: ${OCR_RENDER_ZOOM:-2.0}
      OCR_MULTI_VARIANT: ${OCR_MULTI_VARIANT:-0}
      OCR_TESSERACT_OEM: ${OCR_TESSERACT_OEM:-1}
      OCR_FULL_PAGE: ${OCR_FULL_PAGE:-0}
      OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../${STORAGE_DIR:-storage}:/app/storage
    depends_on:
      - redis
      - ollama

  worker:
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-offline_doc_extractor}_worker
    env_file:
      - ./.env
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      MAX_TEXT_CHARS: ${MAX_TEXT_CHARS}
      REDIS_URL: ${REDIS_URL}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
      USE_LLM_DEFAULT: ${USE_LLM_DEFAULT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_DIR: ${STORAGE_DIR}
      OCR_TESSERACT_PSM: ${OCR_TESSERACT_PSM:-6}
      OCR_TARGETED_REGIONS: ${OCR_TARGETED_REGIONS:-1}
      OCR_TARGETED_ZOOM: ${OCR_TARGETED_ZOOM:-3.0}
      OCR_TARGETED_TIMEOUT_SEC: ${OCR_TARGETED_TIMEOUT_SEC:-12}
      OCR_TIMEOUT_SEC: ${OCR_TIMEOUT_SEC:-45}
      OCR_RENDER_ZOOM: ${OCR_RENDER_ZOOM:-2.0}
      OCR_MULTI_VARIANT: ${OCR_MULTI_VARIANT:-0}
      OCR_TESSERACT_OEM: ${OCR_TESSERACT_OEM:-1}
      OCR_FULL_PAGE: ${OCR_FULL_PAGE:-0}
      OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
    command: ["rq", "worker", "${JOB_QUEUE_NAME:-extract_jobs}", "--url", "${REDIS_URL:-redis://redis:6379/0}"]
    volumes:
      - ../${STORAGE_DIR:-storage}:/app/storage
    depends_on:
      - redis
      - ollama

  frontend:
    build:
      context: ../FE
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-offline_doc_extractor}_frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME:-offline_doc_extractor}_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
